<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" media="(max-width: 800px)" href="altura-max800.css" />
    <link href="./bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style/custom.css">
    <link rel="stylesheet" href="style/cadastro.css">
    <title>DONA FLOR FLORICULTURA</title>
</head>

<body>
    <style>
        body {
            background-image: url(background.png);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .w50 {
            width: 50%;
            float: left;
            padding-right: 15px;
        }

        .box {
            display: flex;
            width: 930px;
        }

        .img-box {
            background-color: rgba(255, 255, 255, 0.5);
            width: 50%;
            display: flex;
            align-items: center;
            padding: 20px;
            border-radius: 20px 0 0 20px;
        }

        .img-box img {
            width: 100%;
        }

        .form-box {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            padding: 30px 40px;
            width: 50%;
            border-radius: 0 20px 20px 0;
        }

        .form-box h2 {
            font-size: 30px;
        }

        .form-box p {
            font-weight: bold;
            color: #3D3D3D;
        }

        .form-box p a {
            color: #00a2ff;
            text-decoration: none;
        }

        .form-box form {
            margin: 20px 0;
        }

        form .input-group {
            margin-bottom: 15px;
        }

        form .input-group label {
            color: #3D3D3D;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        form .input-group input {
            width: 100%;
            height: 47px;
            background-color: rgba(255, 255, 255, 0.32);
            border-radius: 20px;
            outline: none;
            border: 2px solid transparent;
            padding: 15px;
            font-size: 15px;
            color: #616161;
            transition: all 0.4s ease;
        }

        form .input-group input:focus {
            border-color: #a5c6f169;
        }

        form .input-group button {
            width: 100%;
            height: 47px;
            background: #f0e003;
            border-radius: 20px;
            outline: none;
            border: none;
            margin-top: 15px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        @media (max-width:930px) {
            .img-box {
                display: none;
            }

            .box {
                width: 700px;
            }

            .form-box {
                width: 100%;
                border-radius: 20px;
            }
        }

        @media (max-width:500px) {
            .w50 {
                width: 100%;
                padding: 0;
            }
        }
    </style>
    <header>
        <header>
            <div class="container">
                <div class="row">
                    <div class="col">
                        <a href="./index.html"><img src="./images/logo.png" alt="logo" height="100" width="150"></a>

                    </div>
                    <div class="col">
                        <ul class="nav justify-content-end">
                            <li class="nav-item"><a class="nav-link active" href="./index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="./sobre">Sobre</a></li>
                            <li class="nav-item"><a class="nav-link" href="./noticias.html">Notícias</a></li>
                            <li class="nav-item"><a class="nav-link" href="./cadastro.html">Cadastre-se</a></li>
                            <li class="nav-item"><a class="nav-link" href="./login.html">Login</a></li>
                            <li class="nav-item"><a class="nav-link" href="./carrinho.html">Carrinho</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <div class="box">
            <div class="img-box">
                <img src="./images/59.jpg">
            </div>
            <div class="form-box">
                <h2>Criar Conta</h2>
                <p> Já é um membro? <a href="#"> Login </a> </p>
                <form action="#">
                    <div class="input-group">
                        <label for="nome"> Nome Completo</label>
                        <input type="text" id="nome" placeholder="Digite o seu nome completo" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite o seu email" required>
                    </div>

                    <div class="input-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="Digite o seu telefone" required>
                    </div>

                    <div class="input-group w50">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                    </div>

                    <div class="input-group w50">
                        <label for="Confirmarsenha">Confirmar Senha</label>
                        <input type="password" id="Confirmarsenha" placeholder="Confirme a senha" required>
                    </div>

                    <div class="input-group">
                        <button>Cadastrar</button>
                    </div>

                    <script>
                        document.getElementById("cadastroForm").addEventListener("submit", async function (event) {
                            event.preventDefault();

                            const formData = new FormData(event.target);
                            const data = {};
                            formData.forEach((value, key) => {
                                data[key] = value;
                            });

                            const response = await fetch("/cadastrar", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify(data)
                            });

                            const result = await response.json();
                            if (result.success) {
                                alert("Cadastro bem-sucedido!");
                            } else {
                                alert("Erro ao cadastrar. Tente novamente.");
                            }
                        });
                    </script>


                </form>
            </div>
        </div>
</body>


</html>
