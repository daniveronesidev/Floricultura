<body>
    <div class="container">
        <h1>Finalizar Compra</h1>

        <form action="processar_pedido.php" method="post">
            <h2>Meios de Pagamento</h2>
            <label>
                <input type="radio" name="pagamento" value="cartao"> Cartão de Crédito
            </label>
            <label>
                <input type="radio" name="pagamento" value="dinheiro"> Dinheiro
            </label>
            <label>
                <input type="radio" name="pagamento" value="pix"> Pix
            </label>
            <label>
                <input type="radio" name="pagamento" value="boleto"> Boleto Bancário
            </label>

            <h2>Endereço de Entrega</h2>
            <div class="endereco">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" required>

                <label for="cep">CEP:</label>
                <input type="text" id="cep" name="cep" required>
            </div>

            <button type="submit">Confirmar Pedido</button>
        </form>
    </div>
